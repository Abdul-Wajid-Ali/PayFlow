services:
  # Defines the main PayFlow API service, including build configuration, environment variables, and exposed ports
  payflow.api:
    image: ${DOCKER_REGISTRY-}payflowapi
    build:
      context: .
      dockerfile: src/PayFlow.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=5000
      - ASPNETCORE_HTTPS_PORTS=5001
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=PayFlow;Username=payflow;Password=PayFlow@123!
      - Redis__ConnectionString=redis:6379
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Configures PostgreSQL container with persistent storage for application database
  postgres:
    image: postgres:17-alpine
    container_name: postgres-dev
    environment:
      - POSTGRES_DB=PayFlow
      - POSTGRES_USER=payflow
      - POSTGRES_PASSWORD=PayFlow@123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow -d PayFlow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Configures Redis container for caching with data persistence enabled via append-only mode
  redis:
    image: redis:7.2-alpine
    container_name: redis-dev
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Configures RabbitMQ message broker with management UI and persistent message storage
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: rabbitmq-dev
    environment:
      - RABBITMQ_DEFAULT_USER=payflow
      - RABBITMQ_DEFAULT_PASS=payflow123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

# Defines named volumes to persist data for database, cache, and message broker across container restarts
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: