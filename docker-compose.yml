services:
  # Defines the main PayFlow API service, including build configuration, environment variables, and exposed ports
  payflow.api:
    image: ${DOCKER_REGISTRY-}payflowapi
    build:
      context: .
      dockerfile: src/PayFlow.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=5000
      - ASPNETCORE_HTTPS_PORTS=5001
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=PayFlow;User Id=sa;Password=PayFlow@123!;TrustServerCertificate=True;Encrypt=True;MultipleActiveResultSets=True
      - Redis__ConnectionString=redis:6379
    ports:
      - "5000:5000"
      - "5001:5001"

  # Configures SQL Server container with persistent storage for application database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-dev
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - MSSQL_SA_PASSWORD=PayFlow@123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  # Configures Redis container for caching with data persistence enabled via append-only mode
  redis:
    image: redis:7.2-alpine
    container_name: redis-dev
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Configures RabbitMQ message broker with management UI and persistent message storage
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: rabbitmq-dev
    environment:
      - RABBITMQ_DEFAULT_USER=payflow
      - RABBITMQ_DEFAULT_PASS=payflow123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

# Defines named volumes to persist data for database, cache, and message broker across container restarts
volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data: